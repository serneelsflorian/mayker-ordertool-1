name: PR Tests

# Runs on PR open / push to a PR branch. Reports unit, integration, and E2E
# results as PR status checks. Jobs guard on the presence of project
# infrastructure so the scaffold PR (which first creates backend/, frontend/,
# and docker-compose.yml) is not blocked before that infrastructure exists.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect project layout
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
      e2e: ${{ steps.check.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -d backend ] && ls backend/tests >/dev/null 2>&1; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f frontend/package.json ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f docker-compose.yml ] && [ -d e2e/tests ]; then
            echo "e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "e2e=false" >> "$GITHUB_OUTPUT"
          fi

  backend-tests:
    name: Backend unit + integration tests
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ordertool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ordertool_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e .; fi
      - name: Run unit tests
        working-directory: backend
        run: pytest tests/unit -v
      - name: Run integration tests
        working-directory: backend
        run: pytest tests/integration -v

  frontend-tests:
    name: Frontend build + lint
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        working-directory: frontend
        run: npm run build --if-present

  e2e-tests:
    name: E2E (Playwright)
    needs: detect
    if: needs.detect.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Start stack
        run: docker compose up -d --build
      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps
      - name: Run E2E tests
        run: npx playwright test
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Tear down stack
        if: always()
        run: docker compose down -v
